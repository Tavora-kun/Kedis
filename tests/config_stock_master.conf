# 存量同步测试 - 主节点配置
# 监听端口 8888

# 绑定 IP 地址 [default: "127.0.0.1"]
bind 0.0.0.0

# 监听端口 [default: 8888]
# port 8888

# 初始化模式 (snapshot / aof / none)  [default: snapshot]
init-mode none

# 是否开启 aof 写盘 [default: no]
aof-enabled no

replica-mode master

auto-save-enabled no

# 主节点 IP (从节点用) [default: ""]


# 主节点端口 (从节点用) [default: 8888]


# 从节点 IP [default: ""]
slave-host 127.0.0.1

# 从节点端口 [default: ""]
slave-port 9999

# 日志级别 [default: 1=INFO ]
log-level 2

# 日志文件 [default: "" 表示 stdout ]
logfile ""

